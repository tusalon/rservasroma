<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo sin conexión</title>
    <meta name="theme-color" content="#ec4899">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <style>
        :root {
            --brand-primary: #ec4899;
            --brand-secondary: #f9a8d4;
            --brand-surface: #fff1f7;
            --text: #1f2937;
            --muted: #6b7280;
            --border: rgba(236, 72, 153, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100svh;
            background: linear-gradient(180deg, #fff7fb 0%, #fff 42%, #fff1f7 100%);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .offline-shell {
            width: min(100%, 760px);
            margin: 0 auto;
            padding: max(18px, env(safe-area-inset-top)) 16px max(28px, env(safe-area-inset-bottom));
        }

        .offline-header,
        .offline-section,
        .offline-empty {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(236, 72, 153, 0.08);
        }

        .offline-header {
            padding: 20px;
            margin-bottom: 14px;
        }

        .offline-kicker {
            margin: 0 0 4px;
            color: var(--brand-primary);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1,
        h2,
        h3,
        p {
            margin-top: 0;
        }

        h1 {
            margin-bottom: 8px;
            font-size: clamp(26px, 8vw, 34px);
            line-height: 1.08;
        }

        .offline-header p:last-child,
        .offline-muted {
            margin-bottom: 0;
            color: var(--muted);
        }

        .offline-section {
            padding: 16px;
            margin-top: 14px;
        }

        .offline-section h2 {
            margin-bottom: 12px;
            color: var(--brand-primary);
            font-size: 20px;
        }

        .offline-day {
            margin-top: 16px;
        }

        .offline-day:first-of-type {
            margin-top: 0;
        }

        .offline-day h3 {
            margin-bottom: 8px;
            color: #831843;
            font-size: 15px;
            text-transform: capitalize;
        }

        .offline-card {
            display: grid;
            grid-template-columns: 92px minmax(0, 1fr);
            gap: 12px;
            align-items: start;
            padding: 12px;
            margin-bottom: 10px;
            background: var(--brand-surface);
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .offline-time {
            color: #831843;
            font-weight: 800;
            font-size: 13px;
            line-height: 1.25;
        }

        .offline-main {
            display: grid;
            gap: 3px;
            min-width: 0;
        }

        .offline-main strong,
        .offline-main span,
        .offline-main small {
            overflow-wrap: anywhere;
        }

        .offline-main strong {
            font-size: 16px;
        }

        .offline-main span {
            color: var(--text);
            font-size: 14px;
        }

        .offline-main small {
            color: var(--muted);
            font-size: 13px;
        }

        .offline-empty {
            min-height: calc(100svh - 36px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        @media (max-width: 380px) {
            .offline-card {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="offline-root"></div>
    <script src="utils/offline-panel.js?v=20260626-offline-panel"></script>
    <script>
        window.RservasOffline.renderOfflinePanel();
    </script>
</body>
</html>
