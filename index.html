    <!-- Service Worker + detección de actualizaciones -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const pathSegments = window.location.pathname.split('/');
                const basePath = pathSegments.length > 2 ? '/' + pathSegments[1] : '';
                const swPath = basePath ? basePath + '/sw.js' : '/sw.js';

                navigator.serviceWorker.register(swPath).then(registration => {
                    if (registration.waiting) mostrarToastActualizacion(registration.waiting);
                    registration.addEventListener('updatefound', () => {
                        const nuevoSW = registration.installing;
                        nuevoSW.addEventListener('statechange', () => {
                            if (nuevoSW.state === 'installed' && navigator.serviceWorker.controller) {
                                mostrarToastActualizacion(nuevoSW);
                            }
                        });
                    });
                }).catch(() => {});

                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    window.location.reload();
                });
            });
        }

        function mostrarToastActualizacion(sw) {
            var toast = document.getElementById('toast-update');
            if (!toast) return;
            toast.style.transform = 'translateX(-50%) translateY(0)';
            toast.style.opacity = '1';
            document.getElementById('btn-actualizar').onclick = function() {
                toast.style.opacity = '0';
                sw.postMessage({ type: 'SKIP_WAITING' });
            };
        }
    </script>
