    <!-- MASTER APP: sin slug → login de admin.
         Excepción: dentro de una APP INSTALADA de clientas (APK Android o PWA
         añadida a la pantalla de inicio) se restaura el último salón visitado
         o se muestra app-clientes.html — nunca el login de admin.
         - APK clientes: UA con marcador RservasromaClientes / token wv / bridge
           Capacitor, siempre con origen remoto tusalon.github.io. (El APK admin
           corre Capacitor pero sirve assets locales en localhost: queda fuera.)
         - PWA instalada: navigator.standalone (iOS) o display-mode standalone
           (Android/desktop). En iOS la PWA tiene localStorage SEPARADO de
           Safari, así que su primer arranque no tiene slug guardado y debe
           caer en app-clientes.html, no en el login de administración. -->
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var slug = params.get('s');
            if (!slug || slug.trim() === '') {
                var guardado = '';
                try { guardado = localStorage.getItem('negocioSlug') || ''; } catch (e) {}
                var ua = navigator.userAgent || '';
                var esApkClientes = window.location.hostname === 'tusalon.github.io' &&
                    (ua.indexOf('RservasromaClientes') !== -1 || /\bwv\b/.test(ua) || !!window.Capacitor);
                var esPwaInstalada = window.navigator.standalone === true ||
                    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
                if (esApkClientes || esPwaInstalada) {
                    window.location.replace(guardado
                        ? '?s=' + encodeURIComponent(guardado)
                        : 'app-clientes.html');
                } else {
                    window.location.replace('admin-login.html');
                }
            }
        })();
    </script>
    
    <!-- PWA Meta Tags — el SW intercepta manifest.json?s=slug para hacerlo dinámico -->
    <script>
      (function() {
        var esIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        var params = new URLSearchParams(window.location.search);
        var slugUrl = (params.get('s') || '').toLowerCase().trim();

        function nombreGuardadoParaSlug(slug) {
          if (!slug) return '';
          try {
            var scoped = localStorage.getItem('negocioNombre:' + slug) || '';
            if (scoped) return scoped;
            var slugGuardado = (localStorage.getItem('negocioSlug') || '').toLowerCase().trim();
            return slugGuardado === slug ? (localStorage.getItem('negocioNombre') || '') : '';
          } catch (e) {
            return '';
          }
        }

        if (esIOS) {
          // iOS no usa de forma fiable el manifest dinámico (?s=) servido por
          // el Service Worker en "Añadir a pantalla de inicio": caía al
          // estático sin slug y, como el PWA instalado tiene localStorage
          // separado de Safari, abría "esperando enlace". Sin <link
          // rel="manifest">, iOS usa la URL ACTUAL (index.html?s=salon) como
          // inicio — mismo fix ya verificado del panel admin. El nombre del
          // ícono sale de apple-mobile-web-app-title, personalizado aquí.
          var aplicarNombreIOS = function(n) {
            if (!n) return;
            document.title = n;
            var metaTitulo = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (metaTitulo) metaTitulo.setAttribute('content', n);
          };
          document.addEventListener('DOMContentLoaded', function() {
            aplicarNombreIOS(nombreGuardadoParaSlug(slugUrl));
          });
          window.addEventListener('negocio-id-ready', function(ev) {
            try { aplicarNombreIOS(ev.detail && ev.detail.nombre); } catch (e) {}
          });
          return;
        }

        try {
          var slug = slugUrl || (localStorage.getItem('negocioSlug') || '').toLowerCase().trim();
          var nombre = nombreGuardadoParaSlug(slug);
          var link = document.createElement('link');
          link.rel = 'manifest';
          // No mezclar el slug actual con el nombre global de otro negocio.
          link.href = slug
            ? 'manifest.json?s=' + encodeURIComponent(slug) + '&n=' + encodeURIComponent(nombre || slug) + '&v=3'
            : 'manifest.json';
          document.head.appendChild(link);
        } catch(e) {
          var fb = document.createElement('link');
          fb.rel = 'manifest'; fb.href = 'manifest.json';
          document.head.appendChild(fb);
        }
      })();
    </script>

    <!-- Service Worker + detección de actualizaciones -->
    <script>
        let __swRegistration = null;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const pathSegments = window.location.pathname.split('/');
                const basePath = pathSegments.length > 2 ? '/' + pathSegments[1] : '';
                const swPath = basePath ? basePath + '/sw.js' : '/sw.js';

                navigator.serviceWorker.register(swPath).then(registration => {
                    __swRegistration = registration;
                    if (registration.waiting) mostrarToastActualizacion(registration.waiting);
                    registration.addEventListener('updatefound', () => {
                        const nuevoSW = registration.installing;
                        nuevoSW.addEventListener('statechange', () => {
                            if (nuevoSW.state === 'installed' && navigator.serviceWorker.controller) {
                                mostrarToastActualizacion(nuevoSW);
                            }
                        });
                    });
                }).catch(() => {});

                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    window.location.reload();
                });
            });

            // iOS Safari congela (no recarga) las PWA instaladas al salir de
            // ellas: al reabrir desde el ícono, "load" muchas veces no se
            // vuelve a disparar y la revisión de actualizaciones se queda
            // estancada en la de la primera apertura. Forzamos una revisión
            // activa cada vez que la app vuelve a primer plano.
            window.addEventListener('pageshow', () => {
                if (__swRegistration) __swRegistration.update().catch(() => {});
            });
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && __swRegistration) {
                    __swRegistration.update().catch(() => {});
                }
            });
        }

        function ajustarPosicionToastActualizacion() {
            var toast = document.getElementById('toast-update');
            if (!toast || toast.style.opacity !== '1') return;
            // Si el banner de "Instalar app" está visible, subir el cartel
            // para que no se superpongan (ambos anclados abajo).
            var espacioBanner = parseInt(document.body.style.paddingBottom, 10) || 0;
            toast.style.bottom = espacioBanner > 0 ? (espacioBanner + 12) + 'px' : '20px';
        }
        window.__ajustarPosicionToastActualizacion = ajustarPosicionToastActualizacion;

        function mostrarToastActualizacion(sw) {
            var toast = document.getElementById('toast-update');
            if (!toast) return;
            toast.style.transform = 'translateX(-50%) translateY(0)';
            toast.style.opacity = '1';
            ajustarPosicionToastActualizacion();
            document.getElementById('btn-actualizar').onclick = function() {
                toast.style.opacity = '0';
                sw.postMessage({ type: 'SKIP_WAITING' });
            };
            document.getElementById('btn-cerrar-actualizar').onclick = function() {
                toast.style.transform = 'translateX(-50%) translateY(120px)';
                toast.style.opacity = '0';
            };
        }
    </script>

    <script>
    (function() {
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        // El dismiss dura 7 días (antes era por pestaña y reaparecía en cada visita)
        var dismissedHasta = 0;
        try { dismissedHasta = parseInt(localStorage.getItem('pwa-banner-dismissed-hasta') || '0', 10) || 0; } catch (e) {}

        if (isStandalone || Date.now() < dismissedHasta) return;

        var deferredPrompt = null;
        var banner = document.getElementById('pwa-install-banner');

        function nombreSalon() {
            var slug = (new URLSearchParams(window.location.search).get('s') || '').toLowerCase().trim();
            var nombre = '';
            try {
                nombre = localStorage.getItem('negocioNombre:' + slug) || '';
                var slugGuardado = (localStorage.getItem('negocioSlug') || '').toLowerCase().trim();
                if (!nombre && slugGuardado === slug) nombre = localStorage.getItem('negocioNombre') || '';
            } catch (e) {}
            return nombre || (slug ? slug.replace(/-/g, ' ') : 'este salón');
        }

        function mostrarBanner() {
            if (!banner) return;
            banner.style.transform = 'translateY(0)';
            // Reservar espacio abajo para que el banner no tape la barra
            // pegajosa de "Continuar" de la selección de servicios.
            document.body.style.paddingBottom = (banner.offsetHeight + 8) + 'px';
            // Si el cartel de "hay una actualización" ya estaba visible,
            // subirlo para que no quede tapado por este banner.
            window.__ajustarPosicionToastActualizacion?.();
        }

        function ocultarBanner() {
            if (!banner) return;
            banner.style.transform = 'translateY(100%)';
            document.body.style.paddingBottom = '';
            window.__ajustarPosicionToastActualizacion?.();
        }

        if (isIOS) {
            // iOS no tiene beforeinstallprompt: la instalación es manual desde
            // Safari (Compartir → Añadir a pantalla de inicio). En navegadores
            // dentro de apps (Instagram/Facebook) o alternativos (Chrome iOS)
            // no se puede instalar: se sugiere abrir en Safari.
            var ua = navigator.userAgent || '';
            var esInApp = /Instagram|FBAN|FBAV|FB_IAB|Messenger|Line\//i.test(ua);
            var esSafari = !esInApp && !/CriOS|FxiOS|EdgiOS|OPiOS|DuckDuckGo|GSA\//i.test(ua);

            var btnInstalar = document.getElementById('pwa-btn-instalar');
            if (btnInstalar) btnInstalar.style.display = 'none';

            var title = document.getElementById('pwa-banner-title');
            var subtitle = document.getElementById('pwa-banner-subtitle');
            if (title) title.textContent = 'Instala la app de ' + nombreSalon();
            if (subtitle) subtitle.textContent = esSafari
                ? 'Toca Compartir ⬆️ y luego «Añadir a pantalla de inicio»'
                : 'Abre esta página en Safari para poder instalarla';

            setTimeout(mostrarBanner, 5000);
        } else {
            window.addEventListener('beforeinstallprompt', function(e) {
                e.preventDefault();
                deferredPrompt = e;

                var title = document.getElementById('pwa-banner-title');
                if (title) title.textContent = 'Instala la app de ' + nombreSalon();

                // Mostrar después de 5 segundos
                setTimeout(mostrarBanner, 5000);
            });

            document.getElementById('pwa-btn-instalar').addEventListener('click', function() {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') {
                        ocultarBanner();
                    }
                    deferredPrompt = null;
                });
            });
        }

        document.getElementById('pwa-btn-cerrar').addEventListener('click', function() {
            ocultarBanner();
            try { localStorage.setItem('pwa-banner-dismissed-hasta', String(Date.now() + 7 * 24 * 60 * 60 * 1000)); } catch (e) {}
        });
    })();
    </script>

    <script>
        (async function() {
            // El panel offline (agenda completa del salón, con nombres de clientas)
            // es SOLO para la dueña/profesionales: en la app de clientas no se
            // sincroniza, y si quedó guardado de una versión anterior se borra.
            const esPanelStaff = localStorage.getItem('adminAuth') === 'true' || !!localStorage.getItem('profesionalAuth');
            if (!esPanelStaff) {
                try { localStorage.removeItem('rservas_offline_data'); } catch (e) {}
                return;
            }
            const offline = await window.RservasOffline?.redirectIfOffline?.();
            if (!offline) window.RservasOffline?.syncFromSupabase?.();
        })();
    </script>
