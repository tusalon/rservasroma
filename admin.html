    <script>
      (function() {
        try {
          // CRÍTICO iOS: el <link rel="manifest"> se crea SOLO por JS y SOLO en
          // no-iOS. Antes el link estaba estático en el HTML y un script lo
          // quitaba en iOS — demasiado tarde: Safari ya lo había leído al
          // parsearlo, se quedaba con el manifest de clientas (start_url sin
          // slug) y el ícono del panel abría "esperando enlace". Sin link,
          // iOS usa la URL ACTUAL (admin.html?s=slug) como inicio del ícono.
          if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) return;
          var params = new URLSearchParams(window.location.search);
          var slug = (params.get('s') || localStorage.getItem('adminSlug') || localStorage.getItem('negocioSlug') || '').toLowerCase().trim();
          if (!slug) return;
          var nombre = (localStorage.getItem('negocioNombre') || '').trim();
          // Manifest admin servido por el Service Worker (mode=admin): start_url
          // e id propios del panel, para poder instalar la app de clientas y la
          // administrativa del mismo salón sin que una sustituya a la otra.
          var link = document.createElement('link');
          link.rel = 'manifest';
          link.href = 'manifest.json?mode=admin&s=' + encodeURIComponent(slug) + '&n=' + encodeURIComponent(nombre || slug);
          document.head.appendChild(link);
        } catch(e) {}
      })();
    </script>

    <script>
        (function() {
            try {
                // iOS toma el nombre del ícono de "Añadir a pantalla de inicio"
                // de este meta y del título: personalizarlos con el salón de la
                // sesión para que el ícono no diga "Panel de Administración".
                var nombreSalon = (localStorage.getItem('negocioNombre') || '').trim();
                if (nombreSalon) {
                    document.title = nombreSalon + ' — Administración';
                    var appleTitle = document.getElementById('apple-admin-title');
                    if (appleTitle) appleTitle.setAttribute('content', nombreSalon);
                }
            } catch (e) {}
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('sw.js').catch(function() {});
                });
            }
        })();
    </script>

    <script>
        (function() {
            const negocioId = localStorage.getItem('negocioId');

            // Guard de identidad: un enlace admin de OTRO salÃ³n (?s= distinto
            // al de la sesiÃ³n activa) no debe mostrar el negocio anterior ni
            // mezclar datos. Se cierra la sesiÃ³n y se pide login del salÃ³n
            // correcto.
            const slugURL = (new URLSearchParams(window.location.search).get('s') || '').toLowerCase().trim();
            const slugSesion = (localStorage.getItem('adminSlug') || localStorage.getItem('negocioSlug') || '').toLowerCase().trim();
            if (slugURL && slugSesion && slugURL !== slugSesion) {
                localStorage.removeItem('adminAuth');
                localStorage.removeItem('adminLoginTime');
                localStorage.removeItem('profesionalAuth');
                localStorage.removeItem('profesionalLoginTime');
                localStorage.removeItem('negocioId');
                localStorage.removeItem('negocioNombre');
                localStorage.removeItem('negocioSlug');
                localStorage.removeItem('adminSlug');
                window.location.href = 'admin-login.html?s=' + encodeURIComponent(slugURL);
                return;
            }

            // Fijar ?s= en la URL cuando falte (con sesiÃ³n activa): asÃ­
            // "AÃ±adir a pantalla de inicio" en iOS siempre captura la URL
            // del salÃ³n correcto como inicio del Ã­cono.
            if (!slugURL && slugSesion) {
                try { window.history.replaceState(null, '', 'admin.html?s=' + encodeURIComponent(slugSesion)); } catch (e) {}
            }

            if (!negocioId) {
                console.log('ðŸš« No hay sesiÃ³n, redirigiendo a login');
                window.location.href = 'admin-login.html' + (slugURL ? '?s=' + encodeURIComponent(slugURL) : '');
                return;
            }

            // Verificar sesiÃ³n (8 horas)
            const ahora = Date.now();
            const maxSesion = 8 * 60 * 60 * 1000;
            const adminLoginTime = localStorage.getItem('adminLoginTime');
            const profesionalLoginTime = localStorage.getItem('profesionalLoginTime');
            const profesionalAuth = localStorage.getItem('profesionalAuth');
            const isValidAdminSession = adminLoginTime && (ahora - parseInt(adminLoginTime)) < maxSesion;
            const isValidProfesionalSession = profesionalAuth && profesionalLoginTime && (ahora - parseInt(profesionalLoginTime)) < maxSesion;
            
            if (!isValidAdminSession && !isValidProfesionalSession) {
                localStorage.removeItem('adminAuth');
                localStorage.removeItem('adminLoginTime');
                localStorage.removeItem('profesionalAuth');
                localStorage.removeItem('profesionalLoginTime');
                const slugLogin = slugURL || slugSesion;
                window.location.href = 'admin-login.html' + (slugLogin ? '?s=' + encodeURIComponent(slugLogin) : '');
                return;
            }

            function esConfiguradoTrue(valor) {
                return valor === true || String(valor).toLowerCase().trim() === 'true';
            }

            function normalizarSetupTexto(valor) {
                return String(valor || '')
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .trim();
            }

            function esRegistroDemo(tipo, item) {
                var nombre = normalizarSetupTexto(item && item.nombre);
                if (tipo === 'profesional') return nombre === 'profesional principal' || nombre === 'profesional de prueba';
                if (tipo === 'servicio') return nombre === 'servicio de prueba';
                return false;
            }

            async function negocioTieneBaseMinima(negocioId) {
                if (!negocioId || !window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) return true;

                var headers = {
                    apikey: window.SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + window.SUPABASE_ANON_KEY
                };

                var urls = [
                    window.SUPABASE_URL + '/rest/v1/profesionales?negocio_id=eq.' + encodeURIComponent(negocioId) + '&select=id,nombre,activo',
                    window.SUPABASE_URL + '/rest/v1/servicios?negocio_id=eq.' + encodeURIComponent(negocioId) + '&select=id,nombre,activo',
                    window.SUPABASE_URL + '/rest/v1/horarios_profesionales?negocio_id=eq.' + encodeURIComponent(negocioId) + '&select=id,profesional_id'
                ];

                try {
                    var respuestas = await Promise.all(urls.map(function(url) {
                        return fetch(url, { headers: headers });
                    }));

                    if (respuestas.some(function(res) { return !res.ok; })) return true;

                    var datos = await Promise.all(respuestas.map(function(res) {
                        return res.json();
                    }));

                    var profesionalesReales = (datos[0] || []).filter(function(profesional) {
                        return profesional.activo !== false && !esRegistroDemo('profesional', profesional);
                    });
                    var serviciosReales = (datos[1] || []).filter(function(servicio) {
                        return servicio.activo !== false && !esRegistroDemo('servicio', servicio);
                    });
                    var idsProfesionalesReales = profesionalesReales.map(function(profesional) {
                        return String(profesional.id);
                    });
                    var tieneHorarioReal = (datos[2] || []).some(function(horario) {
                        return idsProfesionalesReales.indexOf(String(horario.profesional_id)) !== -1;
                    });

                    return profesionalesReales.length > 0 && serviciosReales.length > 0 && tieneHorarioReal;
                } catch (error) {
                    return true;
                }
            }

            // Si una cuenta nueva entra directo al panel (favorito/PWA/enlace)
            // sin pasar por admin-login, forzar el asistente inicial. El wizard
            // marca configurado=true al terminar.
            if (isValidAdminSession && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
                fetch(window.SUPABASE_URL + '/rest/v1/negocios?id=eq.' + encodeURIComponent(negocioId) + '&select=configurado,slug', {
                    headers: {
                        apikey: window.SUPABASE_ANON_KEY,
                        Authorization: 'Bearer ' + window.SUPABASE_ANON_KEY
                    }
                }).then(function(res) {
                    if (!res.ok) return null;
                    return res.json();
                }).then(async function(rows) {
                    var negocio = rows && rows[0];
                    if (!negocio) return;
                    var puedeAbrirPanel = esConfiguradoTrue(negocio.configurado) && await negocioTieneBaseMinima(negocioId);
                    if (puedeAbrirPanel) return;
                    var slugSetup = slugURL || slugSesion || negocio.slug || '';
                    window.location.href = 'setup-wizard.html' + (slugSetup ? '?s=' + encodeURIComponent(slugSetup) : '');
                }).catch(function() {});
            }
        })();
