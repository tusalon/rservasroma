    <script>
      (function() {
        try {
          // CRÍTICO iOS: el <link rel="manifest"> se crea SOLO por JS y SOLO en
          // no-iOS. Antes el link estaba estático en el HTML y un script lo
          // quitaba en iOS — demasiado tarde: Safari ya lo había leído al
          // parsearlo, se quedaba con el manifest de clientas (start_url sin
          // slug) y el ícono del panel abría "esperando enlace". Sin link,
          // iOS usa la URL ACTUAL (admin.html?s=slug) como inicio del ícono.
          if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) return;
          var params = new URLSearchParams(window.location.search);
          var slug = (params.get('s') || localStorage.getItem('adminSlug') || localStorage.getItem('negocioSlug') || '').toLowerCase().trim();
          if (!slug) return;
          var nombre = (localStorage.getItem('negocioNombre') || '').trim();
          // Manifest admin servido por el Service Worker (mode=admin): start_url
          // e id propios del panel, para poder instalar la app de clientas y la
          // administrativa del mismo salón sin que una sustituya a la otra.
          var link = document.createElement('link');
          link.rel = 'manifest';
          link.href = 'manifest.json?mode=admin&s=' + encodeURIComponent(slug) + '&n=' + encodeURIComponent(nombre || slug);
          document.head.appendChild(link);
        } catch(e) {}
      })();
    </script>

    <script>
        (function() {
            try {
                // iOS toma el nombre del ícono de "Añadir a pantalla de inicio"
                // de este meta y del título: personalizarlos con el salón de la
                // sesión para que el ícono no diga "Panel de Administración".
                var nombreSalon = (localStorage.getItem('negocioNombre') || '').trim();
                if (nombreSalon) {
                    document.title = nombreSalon + ' — Administración';
                    var appleTitle = document.getElementById('apple-admin-title');
                    if (appleTitle) appleTitle.setAttribute('content', nombreSalon);
                }
            } catch (e) {}
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('sw.js').catch(function() {});
                });
            }
        })();
    </script>
