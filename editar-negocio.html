<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="vendor/lucide/lucide.css" rel="stylesheet">
    <link href="utils/legacy-ios-fallback.css?v=20260619-ios15" rel="stylesheet">
    <style>
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <!-- Scripts necesarios -->
    <script src="utils/supabase-config.js"></script>
    <script src="utils/hero-backgrounds.js?v=20260522-fondos-lashes-peluqueria"></script>
    <script src="utils/storage.js"></script>
    <script src="utils/config-negocio-master.js"></script>
    <script src="utils/i18n.js?v=20260716-recordatorios"></script>
    <script src="utils/phone-utils.js?v=20260616-preservar-cero-v2"></script>

    <!-- Componente de ediciÃ³n -->
    <script type="text/babel" src="components/admin/EditarNegocio.js?v=20260716-identidad2"></script>

    <script>
        // Verificar autenticaciÃ³n
        (function() {
            const negocioId = localStorage.getItem('negocioId');

            // Guard de identidad (mismo que admin.html): si esta pÃ¡gina llega
            // con ?s= de OTRO salÃ³n distinto al de la sesiÃ³n, cerrar sesiÃ³n y
            // pedir login del salÃ³n correcto. Evita editar el negocio equivocado.
            const slugURL = (new URLSearchParams(window.location.search).get('s') || '').toLowerCase().trim();
            const slugSesion = (localStorage.getItem('adminSlug') || localStorage.getItem('negocioSlug') || '').toLowerCase().trim();
            if (slugURL && slugSesion && slugURL !== slugSesion) {
                localStorage.removeItem('adminAuth');
                localStorage.removeItem('adminLoginTime');
                localStorage.removeItem('profesionalAuth');
                localStorage.removeItem('profesionalLoginTime');
                localStorage.removeItem('negocioId');
                localStorage.removeItem('negocioNombre');
                localStorage.removeItem('negocioSlug');
                localStorage.removeItem('adminSlug');
                window.location.href = 'admin-login.html?s=' + encodeURIComponent(slugURL);
                return;
            }
            if (!slugURL && slugSesion) {
                try { window.history.replaceState(null, '', 'editar-negocio.html?s=' + encodeURIComponent(slugSesion)); } catch (e) {}
            }

            const adminAuth = localStorage.getItem('adminAuth') === 'true';
            const profesionalAuthRaw = localStorage.getItem('profesionalAuth');
            const profesionalLoginTime = localStorage.getItem('profesionalLoginTime');
            let profesionalNivel = 0;
            try {
                profesionalNivel = profesionalAuthRaw ? (JSON.parse(profesionalAuthRaw).nivel || 1) : 0;
            } catch (e) {
                profesionalNivel = 0;
            }
            const profesionalAvanzado = profesionalAuthRaw && profesionalNivel >= 3 && profesionalLoginTime &&
                (Date.now() - parseInt(profesionalLoginTime)) < 8 * 60 * 60 * 1000;

            if (!negocioId || (!adminAuth && !profesionalAvanzado)) {
                console.log('ðŸš« No hay sesiÃ³n, redirigiendo a login');
                window.location.href = 'admin-login.html' + (slugURL ? '?s=' + encodeURIComponent(slugURL) : '');
            }
        })();
    </script>
</body>
</html>
