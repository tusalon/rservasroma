name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "components/**"
      - "icons/**"
      - "images/**"
      - "scripts/**"
      - "utils/**"
      - "*.html"
      - "*.js"
      - "capacitor.config.json"
      - "package.json"
      - "package-lock.json"

jobs:
  build-debug-apk:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase config
        shell: powershell
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if ($env:ANDROID_GOOGLE_SERVICES_JSON) {
            $env:ANDROID_GOOGLE_SERVICES_JSON | Set-Content -Path android/app/google-services.json -Encoding UTF8
            Write-Host "google-services.json restaurado desde GitHub Secrets"
          } else {
            throw "ANDROID_GOOGLE_SERVICES_JSON no configurado; se cancela el build para no publicar una APK sin push nativo"
          }

      - name: Sync Capacitor Android
        run: npm run android:sync

      # Firma estable: sin esto cada compilacion usa una clave de depuracion
      # distinta y Android rechaza la actualizacion ("conflicto con un paquete").
      - name: Restaurar keystore de firma
        id: keystore
        shell: powershell
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if ($env:KEYSTORE_BASE64) {
            $ruta = Join-Path $env:GITHUB_WORKSPACE "rservasroma-firma.keystore"
            [IO.File]::WriteAllBytes($ruta, [Convert]::FromBase64String($env:KEYSTORE_BASE64))
            "path=$ruta" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Keystore restaurado: la APK llevara firma estable"
          } else {
            "path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "::warning::KEYSTORE_BASE64 no configurado. La APK se firmara con una clave temporal y dara conflicto al actualizar."
          }

      - name: Build debug APK
        working-directory: android
        env:
          RSERVAS_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          RSERVAS_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RSERVAS_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RSERVAS_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: .\gradlew.bat assembleDebug

      - name: Rename APK
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path apk-output
          $apk = Get-ChildItem -Path android/app/build/outputs/apk -Recurse -Filter "*.apk" | Select-Object -First 1
          if (-not $apk) {
            Get-ChildItem -Path android/app/build -Recurse | Select-Object FullName
            throw "No se encontro ningun APK generado"
          }
          Write-Host "APK encontrado: $($apk.FullName)"
          Copy-Item $apk.FullName apk-output/rservasroma-admin-debug.apk

      # Deja constancia de con que clave quedo firmada. Si sale la de
      # depuracion generica ("CN=Android Debug"), esa APK dara conflicto al
      # instalarse sobre una anterior: mejor enterarse aqui que en el grupo.
      - name: Verificar firma de la APK
        shell: powershell
        run: |
          $apksigner = Get-ChildItem -Path "$env:ANDROID_HOME\build-tools" -Recurse -Filter "apksigner.bat" -ErrorAction SilentlyContinue |
                       Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $apksigner) {
            Write-Host "::warning::No se encontro apksigner; no se pudo verificar la firma"
            exit 0
          }
          $salida = & $apksigner.FullName verify --print-certs apk-output/rservasroma-admin-debug.apk 2>&1 | Out-String
          Write-Host $salida
          if ($salida -match "CN=Android Debug") {
            Write-Host "::error::La APK quedo firmada con la clave de depuracion generica. Revisa el secreto KEYSTORE_BASE64: al instalarse sobre una version anterior dara 'conflicto con un paquete'."
            exit 1
          }
          Write-Host "Firma estable confirmada."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rservasroma-admin-debug-apk
          path: apk-output/rservasroma-admin-debug.apk

      - name: Actualizar version en Supabase
        shell: pwsh
        env:
          SUPABASE_URL: https://zorhclhvykikaachfrmp.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          $script = @'
          const https = require("https");
          const version = "1.0." + process.env.BUILD_NUMBER;
          const key = process.env.SUPABASE_SERVICE_KEY;
          const payload = JSON.stringify({ valor: version });
          const u = new URL(
            process.env.SUPABASE_URL +
            "/rest/v1/config_global?clave=eq.admin_version"
          );
          const req = https.request({
            hostname: u.hostname,
            path: u.pathname + u.search,
            method: "PATCH",
            headers: {
              "apikey": key,
              "Authorization": "Bearer " + key,
              "Content-Type": "application/json",
              "Content-Length": Buffer.byteLength(payload)
            }
          }, res => {
            let d = "";
            res.on("data", c => d += c);
            res.on("end", () => {
              console.log("HTTP " + res.statusCode + ": " + (d || "(sin body)"));
              if (res.statusCode >= 400) process.exit(1);
              console.log("Version " + version + " publicada correctamente");
            });
          });
          req.on("error", e => { console.error(e.message); process.exit(1); });
          req.write(payload);
          req.end();
          '@
          $script | Out-File -FilePath "update-version.js" -Encoding utf8NoBOM
          node update-version.js
