name: Recordatorio a clientas (push)

on:
  schedule:
    # 8 PM Cuba (UTC-4) = 00:00 UTC del dia siguiente -> recordatorio "de manana"
    - cron: '0 0 * * *'
    # Respaldos del "de manana": los crons de GitHub Actions son best-effort y
    # pueden retrasarse o saltarse. Sin respaldo, una sola corrida fallida deja
    # a las clientas de manana sin aviso del dia antes. El flag
    # push_recordatorio_dia_enviado evita duplicados si mas de una corre.
    - cron: '30 0 * * *'
    - cron: '0 1 * * *'
    # Cada 30 min -> recordatorio "1 hora antes"
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      tipo:
        description: 'Tipo de recordatorio (dia u hora)'
        required: false
        default: 'dia'

# La anon key de Supabase es PUBLICA por diseno: el sitio ya la sirve en
# utils/supabase-config.js, cualquiera puede leerla. Va aqui como variable y no
# como secreto para no depender de un secreto inexistente (el repo solo tiene
# SUPABASE_SERVICE_KEY, que da privilegios totales y no hace falta aqui: este
# header solo sirve para pasar el gate de autenticacion de la Edge Function).
env:
  SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvcmhjbGh2eWtpa2FhY2hmcm1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNDQzMzUsImV4cCI6MjA4NzcyMDMzNX0.reauF3UfNTFJFZ3Mnzf8ctYH1d5p7C3msi7AvYJUaos

jobs:
  enviar-recordatorio-dia:
    if: github.event.schedule == '0 0 * * *' || github.event.schedule == '30 0 * * *' || github.event.schedule == '0 1 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tipo == 'dia')
    runs-on: ubuntu-latest
    steps:
      - name: Enviar recordatorio "manana tienes cita"
        run: |
          echo "Disparando recordatorio tipo=dia para $(date -u '+%Y-%m-%d %H:%M UTC')..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://zorhclhvykikaachfrmp.supabase.co/functions/v1/recordatorio-cliente" \
            -H "apikey: ${{ env.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"tipo":"dia"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          echo "Respuesta: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: $BODY"
            exit 1
          fi

  enviar-recordatorio-hora:
    if: github.event.schedule == '*/30 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tipo == 'hora')
    runs-on: ubuntu-latest
    steps:
      - name: Enviar recordatorio "tu cita es en 1 hora"
        run: |
          echo "Disparando recordatorio tipo=hora para $(date -u '+%Y-%m-%d %H:%M UTC')..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://zorhclhvykikaachfrmp.supabase.co/functions/v1/recordatorio-cliente" \
            -H "apikey: ${{ env.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"tipo":"hora"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          echo "Respuesta: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: $BODY"
            exit 1
          fi
