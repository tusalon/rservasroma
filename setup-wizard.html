<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configura tu negocio - Rservas.Roma</title>
    <script src="vendor/tailwind-browser.js"></script>
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/babel.min.js"></script>
    <link href="vendor/lucide/lucide.css" rel="stylesheet">
    <link href="utils/legacy-ios-fallback.css?v=20260619-ios15" rel="stylesheet">
    <style>
        .step-active { @apply bg-amber-600 text-white; }
        .step-completed { @apply bg-green-500 text-white; }
        .step-pending { @apply bg-gray-200 text-gray-600; }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <!-- Scripts -->
    <script src="utils/supabase-config.js"></script>
    <script src="utils/hero-backgrounds.js?v=20260522-fondos-lashes-peluqueria"></script>
    <script src="utils/storage.js"></script>
    <script src="utils/config-negocio-master.js"></script>
    <script src="utils/i18n.js?v=20260718-horarios-slots"></script>
    <!-- El wizard crea profesional + servicios funcionales, no solo estética -->
    <script src="utils/profesionales.js?v=20260718-wizard-funcional"></script>
    <script src="utils/servicios.js?v=20260718-wizard-funcional"></script>

    <!-- Componente del wizard -->
    <script type="text/babel" src="components/admin/SetupWizard.js?v=20260718-horarios-slots"></script>

    <script>
        // Verificar sesión admin y negocioId en localStorage
        (function() {
            const negocioId = localStorage.getItem('negocioId');

            // Guard de identidad (mismo que admin.html): ?s= de otro salÃ³n
            // distinto al de la sesiÃ³n => cerrar sesiÃ³n y login del correcto.
            const slugURL = (new URLSearchParams(window.location.search).get('s') || '').toLowerCase().trim();
            const slugSesion = (localStorage.getItem('adminSlug') || localStorage.getItem('negocioSlug') || '').toLowerCase().trim();
            if (slugURL && slugSesion && slugURL !== slugSesion) {
                localStorage.removeItem('adminAuth');
                localStorage.removeItem('adminLoginTime');
                localStorage.removeItem('profesionalAuth');
                localStorage.removeItem('profesionalLoginTime');
                localStorage.removeItem('negocioId');
                localStorage.removeItem('negocioNombre');
                localStorage.removeItem('negocioSlug');
                localStorage.removeItem('adminSlug');
                window.location.href = 'admin-login.html?s=' + encodeURIComponent(slugURL);
                return;
            }

            if (!negocioId) {
                console.log('ðŸš« No hay negocioId, redirigiendo a login');
                window.location.href = 'admin-login.html' + (slugURL ? '?s=' + encodeURIComponent(slugURL) : '');
                return;
            }

            const ahora = Date.now();
            const maxSesion = 8 * 60 * 60 * 1000;
            const adminLoginTime = localStorage.getItem('adminLoginTime');
            const isValidAdminSession = localStorage.getItem('adminAuth') === 'true' &&
                adminLoginTime &&
                (ahora - parseInt(adminLoginTime)) < maxSesion;

            if (!isValidAdminSession) {
                localStorage.removeItem('adminAuth');
                localStorage.removeItem('adminLoginTime');
                localStorage.removeItem('profesionalAuth');
                localStorage.removeItem('profesionalLoginTime');
                window.location.href = 'admin-login.html' + (slugURL ? '?s=' + encodeURIComponent(slugURL) : '');
                return;
            }

            function esConfiguradoTrue(valor) {
                return valor === true || String(valor).toLowerCase().trim() === 'true';
            }

            async function negocioTieneBaseMinima(negocioId) {
                if (!negocioId || !window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) return true;

                var headers = {
                    apikey: window.SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + window.SUPABASE_ANON_KEY
                };

                var urls = [
                    window.SUPABASE_URL + '/rest/v1/profesionales?negocio_id=eq.' + encodeURIComponent(negocioId) + '&select=id&limit=1',
                    window.SUPABASE_URL + '/rest/v1/servicios?negocio_id=eq.' + encodeURIComponent(negocioId) + '&select=id&limit=1',
                    window.SUPABASE_URL + '/rest/v1/horarios_profesionales?negocio_id=eq.' + encodeURIComponent(negocioId) + '&select=id&limit=1'
                ];

                try {
                    var respuestas = await Promise.all(urls.map(function(url) {
                        return fetch(url, { headers: headers });
                    }));

                    if (respuestas.some(function(res) { return !res.ok; })) return true;

                    var datos = await Promise.all(respuestas.map(function(res) {
                        return res.json();
                    }));

                    return datos.every(function(filas) {
                        return Array.isArray(filas) && filas.length > 0;
                    });
                } catch (error) {
                    return true;
                }
            }

            if (window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
                fetch(window.SUPABASE_URL + '/rest/v1/negocios?id=eq.' + encodeURIComponent(negocioId) + '&select=configurado,slug', {
                    headers: {
                        apikey: window.SUPABASE_ANON_KEY,
                        Authorization: 'Bearer ' + window.SUPABASE_ANON_KEY
                    }
                }).then(function(res) {
                    if (!res.ok) return null;
                    return res.json();
                }).then(async function(rows) {
                    var negocio = rows && rows[0];
                    if (!negocio) return;
                    var puedeAbrirPanel = esConfiguradoTrue(negocio.configurado) && await negocioTieneBaseMinima(negocioId);
                    if (!puedeAbrirPanel) return;
                    var slugPanel = slugURL || slugSesion || negocio.slug || '';
                    window.location.href = 'admin.html' + (slugPanel ? '?s=' + encodeURIComponent(slugPanel) : '');
                }).catch(function() {});
            }
        })();
    </script>
</body>
</html>
